<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character-to-3D — Asset Factory</title>
<style>
  :root{
    --bg: #14171a;
    --panel: #1b1f23;
    --line: #2a2f34;
    --text: #e4e6e8;
    --dim: #8b9198;
    --accent: #ff8a3d;
    --accent-dim: #4a3626;
    --ok: #5fbf7a;
    --err: #e2634f;
    --mono: "IBM Plex Mono", "SF Mono", Consolas, monospace;
    --sans: "IBM Plex Sans", -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg); color:var(--text);
    font-family:var(--sans); line-height:1.5;
    padding:32px 20px 80px;
  }
  .wrap{max-width:720px; margin:0 auto;}
  header{margin-bottom:32px; border-bottom:1px solid var(--line); padding-bottom:20px;}
  .tag{font-family:var(--mono); font-size:11px; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase;}
  h1{font-size:22px; margin:6px 0 4px; font-weight:600;}
  .sub{color:var(--dim); font-size:13px; font-family:var(--mono);}

  .stage-strip{display:flex; gap:4px; margin:20px 0 28px;}
  .stage-strip span{flex:1; height:3px; background:var(--line); border-radius:2px;}
  .stage-strip span.active{background:var(--accent);}
  .stage-strip span.done{background:var(--ok);}

  .panel{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:22px; margin-bottom:16px;}
  label{display:block; font-size:12px; color:var(--dim); margin-bottom:6px; font-family:var(--mono);}
  .field{margin-bottom:18px;}
  input[type=text], textarea, select{
    width:100%; background:#101315; border:1px solid var(--line); color:var(--text);
    padding:10px 12px; border-radius:6px; font-family:var(--sans); font-size:14px;
  }
  textarea{min-height:90px; resize:vertical;}
  input:focus, textarea:focus, select:focus{outline:none; border-color:var(--accent);}

  .row{display:flex; gap:14px;}
  .row > .field{flex:1;}

  .dropzone{
    border:1px dashed var(--line); border-radius:8px; padding:20px; text-align:center;
    cursor:pointer; color:var(--dim); font-size:13px; transition:border-color .15s;
  }
  .dropzone.drag{border-color:var(--accent); color:var(--accent);}
  .dropzone img{max-height:100px; border-radius:6px; margin-bottom:8px;}
  .dropzone input{display:none;}

  .route-hint{
    font-family:var(--mono); font-size:12px; color:var(--dim);
    background:#101315; border:1px solid var(--line); border-radius:6px;
    padding:10px 12px; margin-top:8px; display:flex; justify-content:space-between; align-items:center;
  }
  .route-hint b{color:var(--accent); font-weight:600;}

  .toggle-row{display:flex; align-items:center; gap:10px; margin-bottom:18px;}
  .toggle-row input{width:auto;}
  .toggle-row label{margin:0; font-size:13px; color:var(--text);}

  button.submit{
    width:100%; background:var(--accent); color:#1a1200; border:none;
    padding:13px; border-radius:7px; font-weight:600; font-size:14px; cursor:pointer;
    font-family:var(--sans);
  }
  button.submit:disabled{background:var(--accent-dim); color:var(--dim); cursor:not-allowed;}
  button.submit:hover:not(:disabled){filter:brightness(1.08);}

  .status-panel{display:none;}
  .status-panel.show{display:block;}
  .status-line{display:flex; justify-content:space-between; font-family:var(--mono); font-size:13px; padding:8px 0; border-bottom:1px solid var(--line);}
  .status-line:last-child{border-bottom:none;}
  .status-val{color:var(--accent);}
  .status-val.ok{color:var(--ok);}
  .status-val.err{color:var(--err);}

  .download-btn{
    display:block; text-align:center; margin-top:16px; background:var(--ok); color:#0c1f10;
    padding:12px; border-radius:7px; font-weight:600; text-decoration:none; font-size:14px;
  }

  .spinner{
    width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent);
    border-radius:50%; display:inline-block; animation:spin .7s linear infinite; margin-right:6px; vertical-align:-2px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .error-box{
    background:#2a1512; border:1px solid #4a2420; color:var(--err); font-family:var(--mono);
    font-size:12px; padding:12px; border-radius:6px; margin-top:12px; white-space:pre-wrap; word-break:break-word;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="tag">Phase 5.5 — asset factory</div>
    <h1>Character → 3D</h1>
    <div class="sub">reference sheet in → rigged, upscaled package out</div>
  </header>

  <div class="stage-strip" id="stageStrip">
    <span data-stage="queued"></span>
    <span data-stage="running_generation"></span>
    <span data-stage="running_rigging"></span>
    <span data-stage="running_upscale"></span>
    <span data-stage="packaging"></span>
  </div>

  <form class="panel" id="jobForm">
    <div class="field">
      <label for="characterName">character name</label>
      <input type="text" id="characterName" placeholder="e.g. Aryan" required>
    </div>

    <div class="field">
      <label for="description">character description</label>
      <textarea id="description" placeholder="Face, build, outfit, colors, style..." required></textarea>
    </div>

    <div class="field">
      <label>reference image</label>
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" accept="image/*" required>
        <div id="dropzoneContent">drop a character sheet, or click to browse</div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label for="organismType">organism type</label>
        <select id="organismType">
          <option value="human">human</option>
          <option value="animal">animal</option>
          <option value="fantasy_creature">fantasy creature</option>
          <option value="stylized_humanoid">stylized humanoid</option>
          <option value="robot_mechanical">robot / mechanical</option>
        </select>
      </div>
      <div class="field">
        <label for="styleMode">style mode</label>
        <select id="styleMode">
          <option value="stylized">stylized</option>
          <option value="anime">anime</option>
          <option value="photoreal">photoreal</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label for="backendOverride">backend override (optional)</label>
      <select id="backendOverride">
        <option value="">auto-route</option>
        <option value="charactergen">CharacterGen</option>
        <option value="triposr">TripoSR</option>
        <option value="instantmesh">InstantMesh</option>
        <option value="trellis">TRELLIS</option>
      </select>
      <div class="route-hint" id="routeHint">
        <span>routes to → <b id="routeBackend">charactergen</b></span>
        <span id="routeReason" style="color:var(--dim)">anime/stylized → CharacterGen</span>
      </div>
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="quickPreview">
      <label for="quickPreview">quick preview (force TripoSR, fast draft)</label>
    </div>

    <button type="submit" class="submit" id="submitBtn">generate character package</button>
  </form>

  <div class="panel status-panel" id="statusPanel">
    <div class="status-line"><span>job id</span><span class="status-val" id="statJobId">—</span></div>
    <div class="status-line"><span>backend</span><span class="status-val" id="statBackend">—</span></div>
    <div class="status-line"><span>status</span><span class="status-val" id="statStatus"><span class="spinner"></span>queued</span></div>
    <div class="status-line"><span>queue position</span><span class="status-val" id="statQueue">—</span></div>
    <div id="errorBox"></div>
    <a href="#" class="download-btn" id="downloadBtn" style="display:none;">download package (.zip)</a>
    <div id="downloadErrorBox"></div>
  </div>

</div>

<script>
  // Point this at your ngrok URL once the Kaggle backend is running.
  // Either edit the placeholder below, or set window.CHAR3D_API_BASE
  // (e.g. in a <script> tag above this one) before this file loads —
  // see README.md / SETUP_GUIDE.md.
  const API_BASE = window.CHAR3D_API_BASE || "https://YOUR-NGROK-URL.ngrok-free.dev";

  const routingTable = {
    human: { anime: ["charactergen", "purpose-built, pose-canonicalized"],
             stylized: ["charactergen", "purpose-built, pose-canonicalized"],
             photoreal: ["trellis", "sharpest edges, best PBR for realism"] },
    animal: { "*": ["instantmesh", "handles organic forms well"] },
    fantasy_creature: { "*": ["instantmesh", "handles organic forms well"] },
    stylized_humanoid: { "*": ["charactergen", "purpose-built, pose-canonicalized"] },
    robot_mechanical: { "*": ["trellis", "hard-surface strength"] },
  };

  const organismSel = document.getElementById('organismType');
  const styleSel = document.getElementById('styleMode');
  const overrideSel = document.getElementById('backendOverride');
  const quickPreview = document.getElementById('quickPreview');
  const routeBackendEl = document.getElementById('routeBackend');
  const routeReasonEl = document.getElementById('routeReason');

  function updateRouteHint(){
    if (quickPreview.checked){
      routeBackendEl.textContent = 'triposr';
      routeReasonEl.textContent = 'quick preview forced';
      return;
    }
    if (overrideSel.value){
      routeBackendEl.textContent = overrideSel.value;
      routeReasonEl.textContent = 'manual override';
      return;
    }
    const rules = routingTable[organismSel.value] || {};
    const pick = rules[styleSel.value] || rules['*'] || ['triposr', 'fast fallback'];
    routeBackendEl.textContent = pick[0];
    routeReasonEl.textContent = pick[1];
  }
  [organismSel, styleSel, overrideSel, quickPreview].forEach(el => el.addEventListener('change', updateRouteHint));
  updateRouteHint();

  // Dropzone
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const dropzoneContent = document.getElementById('dropzoneContent');

  dropzone.addEventListener('click', () => fileInput.click());
  ['dragover','dragleave','drop'].forEach(evt => {
    dropzone.addEventListener(evt, e => {
      e.preventDefault();
      dropzone.classList.toggle('drag', evt === 'dragover');
    });
  });
  dropzone.addEventListener('drop', e => {
    if (e.dataTransfer.files.length){
      fileInput.files = e.dataTransfer.files;
      previewFile(fileInput.files[0]);
    }
  });
  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) previewFile(fileInput.files[0]);
  });
  function previewFile(file){
    const reader = new FileReader();
    reader.onload = e => {
      dropzoneContent.innerHTML = `<img src="${e.target.result}"><div>${file.name}</div>`;
    };
    reader.readAsDataURL(file);
  }

  // Stage strip
  const stages = ["queued","running_generation","running_rigging","running_upscale","packaging"];
  function setStage(status){
    const idx = stages.indexOf(status);
    document.querySelectorAll('#stageStrip span').forEach((el, i) => {
      el.classList.remove('active','done');
      if (status === 'complete'){ el.classList.add('done'); return; }
      if (i < idx) el.classList.add('done');
      if (i === idx) el.classList.add('active');
    });
  }

  // Submit
  const form = document.getElementById('jobForm');
  const submitBtn = document.getElementById('submitBtn');
  const statusPanel = document.getElementById('statusPanel');
  const statJobId = document.getElementById('statJobId');
  const statBackend = document.getElementById('statBackend');
  const statStatus = document.getElementById('statStatus');
  const statQueue = document.getElementById('statQueue');
  const downloadBtn = document.getElementById('downloadBtn');
  const errorBox = document.getElementById('errorBox');

  let pollTimer = null;

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!fileInput.files.length){ alert('Add a reference image first.'); return; }

    submitBtn.disabled = true;
    submitBtn.textContent = 'submitting...';
    errorBox.innerHTML = '';
    downloadBtn.style.display = 'none';
    statusPanel.classList.add('show');

    const fd = new FormData();
    fd.append('character_name', document.getElementById('characterName').value);
    fd.append('character_description', document.getElementById('description').value);
    fd.append('organism_type', organismSel.value);
    fd.append('style_mode', styleSel.value);
    fd.append('quick_preview', quickPreview.checked);
    if (overrideSel.value) fd.append('backend_override', overrideSel.value);
    fd.append('reference_image', fileInput.files[0]);

    try {
      const res = await fetch(`${API_BASE}/jobs`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      statJobId.textContent = data.job_id;
      pollJob(data.job_id);
    } catch (err) {
      errorBox.innerHTML = `<div class="error-box">Submit failed: ${err.message}</div>`;
      submitBtn.disabled = false;
      submitBtn.textContent = 'generate character package';
    }
  });

  function pollJob(jobId){
    clearInterval(pollTimer);
    pollTimer = setInterval(async () => {
      try {
        const res = await fetch(`${API_BASE}/jobs/${jobId}`);
        if (!res.ok) throw new Error(await res.text());
        const job = await res.json();

        setStage(job.status);
        statBackend.textContent = job.backend_used || '—';
        statQueue.textContent = job.status === 'queued' ? (job.queue_position ?? '—') : '—';

        if (job.status === 'complete'){
          statStatus.innerHTML = job.cache_hit
            ? '<span class="status-val ok">complete (cache hit)</span>'
            : '<span class="status-val ok">complete</span>';
          downloadBtn.style.display = 'block';
          downloadBtn.dataset.jobId = jobId;
          downloadBtn.dataset.characterName = job.request?.character_name || jobId;
          submitBtn.disabled = false;
          submitBtn.textContent = 'generate character package';
          clearInterval(pollTimer);
        } else if (job.status === 'failed'){
          statStatus.innerHTML = '<span class="status-val err">failed</span>';
          errorBox.innerHTML = `<div class="error-box">${(job.error || 'Unknown error').slice(0, 800)}</div>`;
          submitBtn.disabled = false;
          submitBtn.textContent = 'generate character package';
          clearInterval(pollTimer);
        } else {
          statStatus.innerHTML = `<span class="spinner"></span>${job.status.replaceAll('_',' ')}`;
        }
      } catch (err) {
        // transient network hiccup — keep polling
      }
    }, 2000);
  }

  // Download button — fetches the zip as a blob and saves it directly from
  // this page, rather than navigating the browser to the ngrok/Kaggle URL.
  const downloadErrorBox = document.getElementById('downloadErrorBox');

  downloadBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    const jobId = downloadBtn.dataset.jobId;
    if (!jobId) return;

    const originalLabel = downloadBtn.textContent;
    downloadBtn.textContent = 'downloading...';
    downloadBtn.style.pointerEvents = 'none';
    downloadErrorBox.innerHTML = '';

    try {
      const res = await fetch(`${API_BASE}/jobs/${jobId}/download`);
      if (!res.ok) throw new Error(await res.text());

      // Prefer the filename the server sent (Content-Disposition), fall
      // back to the character name if the header isn't exposed by CORS.
      const disposition = res.headers.get('Content-Disposition') || '';
      const match = disposition.match(/filename="?([^"]+)"?/);
      const filename = match ? match[1] : `${downloadBtn.dataset.characterName}.zip`;

      const blob = await res.blob();
      const blobUrl = URL.createObjectURL(blob);

      const tempLink = document.createElement('a');
      tempLink.href = blobUrl;
      tempLink.download = filename;
      document.body.appendChild(tempLink);
      tempLink.click();
      tempLink.remove();
      URL.revokeObjectURL(blobUrl);

      downloadBtn.textContent = 'downloaded ✓';
      setTimeout(() => { downloadBtn.textContent = originalLabel; }, 2500);
    } catch (err) {
      downloadErrorBox.innerHTML = `<div class="error-box">Download failed: ${err.message}</div>`;
      downloadBtn.textContent = originalLabel;
    } finally {
      downloadBtn.style.pointerEvents = 'auto';
    }
  });
</script>
</body>
</html>
